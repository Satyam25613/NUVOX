<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUVOX — Dashboard</title>
    <meta name="description" content="NUVOX interview history and performance dashboard." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ── Dashboard specific ──────────────────────────────────── */
        .dash-hero {
            padding: 40px 0 32px;
            animation: fade-up 0.5s ease both;
        }

        .dash-hero h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }

        .dash-hero p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* ── Stat boxes ─────────────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
            animation: fade-up 0.5s 0.1s ease both;
        }

        @media (max-width: 520px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }

        .stat-box {
            background: rgba(255, 252, 245, 0.72);
            border: 1px solid rgba(180, 150, 100, 0.22);
            border-radius: 14px;
            padding: 22px 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(20px);
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.90) inset, 0 4px 16px rgba(140, 110, 70, 0.06);
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        .stat-sub {
            font-size: 0.75rem;
            color: var(--muted);
        }

        /* ── Section header ─────────────────────────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        /* ── Interview history list ──────────────────────────────── */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fade-up 0.5s 0.2s ease both;
        }

        .history-row {
            background: rgba(255, 252, 245, 0.68);
            border: 1px solid rgba(180, 150, 100, 0.20);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: background 0.2s, border-color 0.2s;
            flex-wrap: wrap;
            backdrop-filter: blur(16px);
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.90) inset;
        }

        .history-row:hover {
            background: rgba(255, 252, 245, 0.90);
            border-color: rgba(180, 150, 100, 0.35);
        }

        .history-role {
            font-family: var(--font-display);
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text);
        }

        .history-date {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 3px;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .view-report-link {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-bright);
            text-decoration: none;
            padding: 7px 14px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.06);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .view-report-link:hover {
            background: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.5);
        }

        /* ── Empty state ─────────────────────────────────────────── */
        .empty-state {
            background: rgba(255, 252, 245, 0.50);
            border: 1.5px dashed rgba(180, 150, 100, 0.22);
            border-radius: 16px;
            padding: 60px 32px;
            text-align: center;
            animation: fade-up 0.5s 0.2s ease both;
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .empty-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .empty-sub {
            font-size: 0.88rem;
            color: var(--muted);
            margin-bottom: 24px;
        }

        /* ── Start CTA ──────────────────────────────────────────── */
        .dash-cta {
            margin-bottom: 32px;
            animation: fade-up 0.5s 0.15s ease both;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">N</div><span>NUVOX</span>
        </a>
        <div class="navbar-links">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="resume-upload.html">New Interview</a>
        </div>
    </nav>

    <div class="page-content" style="max-width:860px;">

        <!-- Hero -->
        <div class="dash-hero">
            <h1>Dashboard</h1>
            <p>Your interview history and performance at a glance.</p>
        </div>

        <!-- 3 Stat Boxes -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Total Interviews</div>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-sub">sessions completed</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Average Score</div>
                <div class="stat-value" id="stat-avg">—</div>
                <div class="stat-sub">out of 10</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Best Score</div>
                <div class="stat-value" id="stat-best">—</div>
                <div class="stat-sub">personal record</div>
            </div>
        </div>

        <!-- Start CTA -->
        <div class="dash-cta">
            <button class="btn-primary" onclick="window.location.href='resume-upload.html'">
                + Start New Interview
            </button>
        </div>

        <!-- Recent Interviews -->
        <div class="section-header">
            <div class="section-title">Recent Interviews</div>
        </div>

        <div id="history-container"></div>

    </div>

    <script>
        // Score colour: 8-10 green, 5-7 blue, 1-4 red (darker for cream bg)
        function scoreColor(n) {
            if (!n && n !== 0) return '#9c8060';
            if (n >= 8) return '#16a34a';
            if (n >= 5) return '#2563EB';
            return '#dc2626';
        }

        function scoreBg(n) {
            if (!n && n !== 0) return 'rgba(156,128,96,0.10)';
            if (n >= 8) return 'rgba(22,163,74,0.10)';
            if (n >= 5) return 'rgba(37,99,235,0.10)';
            return 'rgba(220,38,38,0.10)';
        }

        function formatDate(iso) {
            if (!iso) return 'Unknown date';
            const d = new Date(iso);
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function roleLabel(key) {
            if (!key) return 'General';
            return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function loadDashboard() {
            const history = JSON.parse(localStorage.getItem('nuvox_history') || '[]');

            // Stats
            const total = history.length;
            const scored = history.filter(h => h.score != null && h.score > 0);
            const avg = scored.length
                ? Math.round(scored.reduce((s, h) => s + h.score, 0) / scored.length)
                : null;
            const best = scored.length
                ? Math.max(...scored.map(h => h.score))
                : null;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-avg').textContent = avg != null ? `${avg}/10` : '—';
            document.getElementById('stat-best').textContent = best != null ? `${best}/10` : '—';

            const container = document.getElementById('history-container');

            if (total === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎤</div>
                        <div class="empty-title">No interviews yet</div>
                        <div class="empty-sub">Start your first mock interview to see your performance history here.</div>
                        <button class="btn-primary" onclick="window.location.href='resume-upload.html'">
                            Start Your First Interview →
                        </button>
                    </div>
                `;
                return;
            }

            // Sort newest first
            const sorted = [...history].reverse();

            const list = document.createElement('div');
            list.className = 'history-list';

            sorted.forEach(entry => {
                const row = document.createElement('div');
                row.className = 'history-row';
                const color = scoreColor(entry.score);
                const bg = scoreBg(entry.score);
                const scoreText = entry.score != null ? entry.score : '—';

                row.innerHTML = `
                    <div>
                        <div class="history-role">${roleLabel(entry.persona)}</div>
                        <div class="history-date">${formatDate(entry.date)}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div class="score-badge" style="background:${bg};color:${color};border:1.5px solid ${color}30;">
                            ${scoreText}
                        </div>
                        <a href="report.html?id=${entry.interview_id}" class="view-report-link">View Report →</a>
                    </div>
                `;
                list.appendChild(row);
            });

            container.appendChild(list);
        }

        loadDashboard();
    </script>

</body>

</html>
